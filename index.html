<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTS Tank Zoom Demo</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
      font-family: Arial, sans-serif;
      color: #eee;
    }

    #game {
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      background: #182018;
    }

    .hud {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      line-height: 1.35;
      font-size: 14px;
      pointer-events: none;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="hud">
    <div><strong>Controls</strong></div>
    <div>Mouse wheel: zoom to cursor</div>
    <div>Left drag: box select</div>
    <div>Right click: move selected tanks</div>
    <div>Middle drag or Shift+Left drag: pan camera</div>
  </div>

  <script>
    const canvas = document.getElementById('game')
    const ctx = canvas.getContext('2d')

    function resize() {
      canvas.width = window.innerWidth
      canvas.height = window.innerHeight
    }

    resize()
    window.addEventListener('resize', resize)

    const world = {
      width: 3200,
      height: 2200,
      tanks: []
    }

    const camera = {
      x: world.width / 2,
      y: world.height / 2,
      zoom: 1,
      minZoom: 0.35,
      maxZoom: 3.5
    }

    const input = {
      mouseX: 0,
      mouseY: 0,
      leftDown: false,
      middleDown: false,
      rightDown: false,
      dragStartX: 0,
      dragStartY: 0,
      dragCurrentX: 0,
      dragCurrentY: 0,
      isBoxSelecting: false,
      isPanning: false,
      panLastX: 0,
      panLastY: 0,
      shift: false
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min
    }

    function createTank(id) {
      return {
        id,
        x: rand(150, world.width - 150),
        y: rand(150, world.height - 150),
        angle: rand(0, Math.PI * 2),
        speed: 85,
        selected: false,
        targetX: null,
        targetY: null,
        radius: 18
      }
    }

    for (let i = 0; i < 14; i++) {
      world.tanks.push(createTank(i + 1))
    }

    function screenToWorld(screenX, screenY) {
      return {
        x: (screenX - canvas.width / 2) / camera.zoom + camera.x,
        y: (screenY - canvas.height / 2) / camera.zoom + camera.y
      }
    }

    function worldToScreen(worldX, worldY) {
      return {
        x: (worldX - camera.x) * camera.zoom + canvas.width / 2,
        y: (worldY - camera.y) * camera.zoom + canvas.height / 2
      }
    }

    function clampCamera() {
      const halfW = canvas.width / 2 / camera.zoom
      const halfH = canvas.height / 2 / camera.zoom
      camera.x = Math.max(halfW, Math.min(world.width - halfW, camera.x))
      camera.y = Math.max(halfH, Math.min(world.height - halfH, camera.y))
    }

    function getSelectionRectWorld() {
      const a = screenToWorld(input.dragStartX, input.dragStartY)
      const b = screenToWorld(input.dragCurrentX, input.dragCurrentY)
      return {
        x1: Math.min(a.x, b.x),
        y1: Math.min(a.y, b.y),
        x2: Math.max(a.x, b.x),
        y2: Math.max(a.y, b.y)
      }
    }

    function setSelectionFromBox() {
      const rect = getSelectionRectWorld()
      for (const tank of world.tanks) {
        tank.selected = tank.x >= rect.x1 && tank.x <= rect.x2 && tank.y >= rect.y1 && tank.y <= rect.y2
      }
    }

    function clearSelection() {
      for (const tank of world.tanks) {
        tank.selected = false
      }
    }

    function issueMoveCommand(worldX, worldY) {
      const selected = world.tanks.filter(t => t.selected)
      if (!selected.length) return

      const cols = Math.ceil(Math.sqrt(selected.length))
      const spacing = 46
      const rows = Math.ceil(selected.length / cols)
      const startX = worldX - ((cols - 1) * spacing) / 2
      const startY = worldY - ((rows - 1) * spacing) / 2

      selected.forEach((tank, index) => {
        const col = index % cols
        const row = Math.floor(index / cols)
        tank.targetX = startX + col * spacing
        tank.targetY = startY + row * spacing
      })
    }

    function update(dt) {
      for (const tank of world.tanks) {
        if (tank.targetX == null || tank.targetY == null) continue

        const dx = tank.targetX - tank.x
        const dy = tank.targetY - tank.y
        const dist = Math.hypot(dx, dy)

        if (dist < 2) {
          tank.x = tank.targetX
          tank.y = tank.targetY
          tank.targetX = null
          tank.targetY = null
          continue
        }

        const step = Math.min(dist, tank.speed * dt)
        tank.x += (dx / dist) * step
        tank.y += (dy / dist) * step
        tank.angle = Math.atan2(dy, dx)
      }

      clampCamera()
    }

    function drawGrid() {
      const grid = 100
      const viewHalfW = canvas.width / 2 / camera.zoom
      const viewHalfH = canvas.height / 2 / camera.zoom
      const left = camera.x - viewHalfW
      const right = camera.x + viewHalfW
      const top = camera.y - viewHalfH
      const bottom = camera.y + viewHalfH

      ctx.strokeStyle = 'rgba(255,255,255,0.08)'
      ctx.lineWidth = 1 / camera.zoom

      const startX = Math.floor(left / grid) * grid
      const endX = Math.ceil(right / grid) * grid
      const startY = Math.floor(top / grid) * grid
      const endY = Math.ceil(bottom / grid) * grid

      for (let x = startX; x <= endX; x += grid) {
        ctx.beginPath()
        ctx.moveTo(x, top)
        ctx.lineTo(x, bottom)
        ctx.stroke()
      }

      for (let y = startY; y <= endY; y += grid) {
        ctx.beginPath()
        ctx.moveTo(left, y)
        ctx.lineTo(right, y)
        ctx.stroke()
      }
    }

    function drawWorldBounds() {
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'
      ctx.lineWidth = 4 / camera.zoom
      ctx.strokeRect(0, 0, world.width, world.height)
    }

    function drawTank(tank) {
      ctx.save()
      ctx.translate(tank.x, tank.y)
      ctx.rotate(tank.angle)

      ctx.fillStyle = tank.selected ? '#8ef58e' : '#5ea05e'
      ctx.strokeStyle = tank.selected ? '#d8ffd8' : '#1f301f'
      ctx.lineWidth = 2 / camera.zoom

      ctx.beginPath()
      ctx.roundRect(-20, -14, 40, 28, 6 / camera.zoom)
      ctx.fill()
      ctx.stroke()

      ctx.fillStyle = '#2f4a2f'
      ctx.fillRect(-10, -10, 20, 20)

      ctx.strokeStyle = '#d7e6d7'
      ctx.lineWidth = 4 / camera.zoom
      ctx.beginPath()
      ctx.moveTo(0, 0)
      ctx.lineTo(28, 0)
      ctx.stroke()

      ctx.restore()

      if (tank.selected) {
        ctx.strokeStyle = 'rgba(180,255,180,0.95)'
        ctx.lineWidth = 2 / camera.zoom
        ctx.beginPath()
        ctx.arc(tank.x, tank.y, tank.radius + 10, 0, Math.PI * 2)
        ctx.stroke()
      }

      if (tank.targetX != null && tank.targetY != null) {
        ctx.strokeStyle = 'rgba(255,255,255,0.35)'
        ctx.lineWidth = 1.5 / camera.zoom
        ctx.beginPath()
        ctx.moveTo(tank.x, tank.y)
        ctx.lineTo(tank.targetX, tank.targetY)
        ctx.stroke()
      }
    }

    function drawMoveMarkers() {
      for (const tank of world.tanks) {
        if (tank.targetX == null || tank.targetY == null) continue
        ctx.strokeStyle = 'rgba(255,255,255,0.4)'
        ctx.lineWidth = 2 / camera.zoom
        ctx.beginPath()
        ctx.arc(tank.targetX, tank.targetY, 10, 0, Math.PI * 2)
        ctx.stroke()
      }
    }

    function drawSelectionBox() {
      if (!input.isBoxSelecting) return
      const x = Math.min(input.dragStartX, input.dragCurrentX)
      const y = Math.min(input.dragStartY, input.dragCurrentY)
      const w = Math.abs(input.dragCurrentX - input.dragStartX)
      const h = Math.abs(input.dragCurrentY - input.dragStartY)

      ctx.setTransform(1, 0, 0, 1, 0, 0)
      ctx.fillStyle = 'rgba(120, 190, 255, 0.18)'
      ctx.strokeStyle = 'rgba(150, 210, 255, 0.95)'
      ctx.lineWidth = 1
      ctx.fillRect(x, y, w, h)
      ctx.strokeRect(x, y, w, h)
    }

    function render() {
      ctx.setTransform(1, 0, 0, 1, 0, 0)
      ctx.clearRect(0, 0, canvas.width, canvas.height)

      ctx.setTransform(
        camera.zoom,
        0,
        0,
        camera.zoom,
        canvas.width / 2 - camera.x * camera.zoom,
        canvas.height / 2 - camera.y * camera.zoom
      )

      drawGrid()
      drawWorldBounds()
      drawMoveMarkers()

      for (const tank of world.tanks) {
        drawTank(tank)
      }

      drawSelectionBox()
    }

    canvas.addEventListener('contextmenu', e => e.preventDefault())

    window.addEventListener('keydown', e => {
      if (e.key === 'Shift') input.shift = true
    })

    window.addEventListener('keyup', e => {
      if (e.key === 'Shift') input.shift = false
    })

    canvas.addEventListener('mousedown', e => {
      const rect = canvas.getBoundingClientRect()
      input.mouseX = e.clientX - rect.left
      input.mouseY = e.clientY - rect.top

      if (e.button === 1 || (e.button === 0 && input.shift)) {
        input.isPanning = true
        input.panLastX = input.mouseX
        input.panLastY = input.mouseY
        return
      }

      if (e.button === 0) {
        input.leftDown = true
        input.dragStartX = input.mouseX
        input.dragStartY = input.mouseY
        input.dragCurrentX = input.mouseX
        input.dragCurrentY = input.mouseY
        input.isBoxSelecting = true
        return
      }

      if (e.button === 2) {
        const target = screenToWorld(input.mouseX, input.mouseY)
        issueMoveCommand(target.x, target.y)
      }
    })

    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect()
      input.mouseX = e.clientX - rect.left
      input.mouseY = e.clientY - rect.top

      if (input.isPanning) {
        const dx = input.mouseX - input.panLastX
        const dy = input.mouseY - input.panLastY
        camera.x -= dx / camera.zoom
        camera.y -= dy / camera.zoom
        input.panLastX = input.mouseX
        input.panLastY = input.mouseY
      }

      if (input.isBoxSelecting) {
        input.dragCurrentX = input.mouseX
        input.dragCurrentY = input.mouseY
      }
    })

    window.addEventListener('mouseup', e => {
      if (e.button === 1 || (e.button === 0 && input.isPanning)) {
        input.isPanning = false
      }

      if (e.button === 0 && input.isBoxSelecting) {
        const dragDist = Math.hypot(input.dragCurrentX - input.dragStartX, input.dragCurrentY - input.dragStartY)
        if (dragDist < 4) {
          const worldPos = screenToWorld(input.dragCurrentX, input.dragCurrentY)
          let clickedTank = null
          for (let i = world.tanks.length - 1; i >= 0; i--) {
            const tank = world.tanks[i]
            if (Math.hypot(worldPos.x - tank.x, worldPos.y - tank.y) <= tank.radius + 10) {
              clickedTank = tank
              break
            }
          }
          clearSelection()
          if (clickedTank) clickedTank.selected = true
        } else {
          setSelectionFromBox()
        }

        input.leftDown = false
        input.isBoxSelecting = false
      }
    })

    canvas.addEventListener('wheel', e => {
      e.preventDefault()

      const rect = canvas.getBoundingClientRect()
      const mouseX = e.clientX - rect.left
      const mouseY = e.clientY - rect.top

      const before = screenToWorld(mouseX, mouseY)
      const zoomFactor = e.deltaY < 0 ? 1.12 : 1 / 1.12
      camera.zoom *= zoomFactor
      camera.zoom = Math.max(camera.minZoom, Math.min(camera.maxZoom, camera.zoom))
      const after = screenToWorld(mouseX, mouseY)

      camera.x += before.x - after.x
      camera.y += before.y - after.y
      clampCamera()
    }, { passive: false })

    let lastTime = performance.now()

    function frame(now) {
      const dt = Math.min(0.05, (now - lastTime) / 1000)
      lastTime = now
      update(dt)
      render()
      requestAnimationFrame(frame)
    }

    requestAnimationFrame(frame)
  </script>
</body>
</html>
