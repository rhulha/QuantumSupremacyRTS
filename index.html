<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RTS Tank Zoom Demo</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ai-status" class="ai-status"></div>

  <div class="hud">
    Resources: <span id="hq-resources">0</span>
    <div style="margin-bottom:4px"><a href="map_editor.html" style="color:#8abeee;font-size:12px;pointer-events:auto">Map Editor</a></div>
    <div>Middle drag or Shift+Left drag: pan camera</div>
  </div>

  <div id="hq-panel" class="hq-panel hidden">
    <div class="hq-resources"></div>
    <button id="btn-build-tank">Build Tank (50)</button>
    <button id="btn-build-collector">Build Collector (30)</button>
    <button id="btn-build-helicopter">Build Helicopter (80)</button>
    <button id="btn-build-sam-truck">Build SAM Truck (70)</button>
    <span id="hq-build-queue" style="font-size:12px;color:#aac;"></span>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
